<!DOCTYPE html>
<html>
<head>
  <title>Piranha Prototype 1.0</title>
  <script src="popup.js"></script>
  <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
  <img src="Piranha_Logo.png"  alt="Piranha Logo" width="300" height="400">
  <h3>Blocked Websites</h3>
  <ul id="blockedList"></ul>
  <div class="addSiteForm">
    <h4>Add a site to block:</h4>
    <input type="text" id="siteInput" placeholder="e.g. google.com">
    <button id="addSite">Add Site</button>
    <button id="blockCurrentSite">Block Current Site</button>
  </div>
</body>
</html>
